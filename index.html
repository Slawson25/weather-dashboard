<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Weather Dashboard</h1>
    </header>

    <main class="container">
        <aside class="search-section">
            <h2>Search for a City:</h2>
            <form id="search-form">
                <input type="text" id="city-input" placeholder="Bell County" required>
                <button type="submit">Search</button>
            </form>
            <div id="history" class="history-list">
                </div>
        </aside>

        <section class="weather-display">
            <div id="current-weather" class="current-card">
                <h2>Search for a city to see the weather!</h2>
            </div>
            
            <div class="forecast-section">
                <h3>5-Day Forecast:</h3>
                <div id="forecast-cards" class="forecast-grid">
                    </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
